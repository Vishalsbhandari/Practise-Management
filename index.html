/* Backfill structure for data saved by older versions */
const normalize = (d) => {
  d.settings = { ...DEFAULT_SETTINGS, ...(d.settings || {}) };
  const s = d.settings;
  if (!Array.isArray(s.complianceAreas) || !s.complianceAreas.length) s.complianceAreas = [...DEFAULT_SETTINGS.complianceAreas];
  if (!Array.isArray(s.reminderDays)) s.reminderDays = [...DEFAULT_SETTINGS.reminderDays];
  if (!Array.isArray(d.masters)) d.masters = [];
  if (!Array.isArray(d.notices)) d.notices = [];

  const findOrAddMaster = (title, compliance) => {
    let m = d.masters.find((x) => x.title === title && x.compliance === compliance);
    if (!m) { m = { id: uid(), title, compliance }; d.masters.push(m); }
    return m.id;
  };
  // migrate any legacy templates
  if (s.taskTemplates && Array.isArray(s.taskTemplates)) {
    s.taskTemplates.forEach((t) => findOrAddMaster(t.title, t.compliance));
    delete s.taskTemplates;
  }
  // migrate legacy denormalised tasks (title + compliance on the task)
  d.tasks = (d.tasks || []).map((t) => {
    if (t.masterId && d.masters.some((m) => m.id === t.masterId)) return t;
    const title = t.title || "Task";
    const compliance = t.compliance || s.complianceAreas[0] || "GST";
    const masterId = findOrAddMaster(title, compliance);
    const { title: _t, compliance: _c, ...rest } = t;
    return { ...rest, masterId };
  });
  return d;
};

const Donut = ({ segments, size = 128, thickness = 16 }) => {
  const total = segments.reduce((s, x) => s + x.value, 0);
  const r = (size - thickness) / 2;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="shrink-0">
      <g transform={`rotate(-90 ${size / 2} ${size / 2})`}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#eef1f6" strokeWidth={thickness} />
        {segments.map((s, i) => {
          const len = total ? (s.value / total) * circ : 0;
          const el = <circle key={i} cx={size / 2} cy={size / 2} r={r} fill="none" stroke={s.color} strokeWidth={thickness} strokeDasharray={`${len} ${circ - len}`} strokeDashoffset={-offset} />;
          offset += len;
          return el;
        })}
      </g>
      <text x="50%" y="46%" textAnchor="middle" dominantBaseline="middle" style={{ fill: "#1f2937", fontSize: 26, fontWeight: 700 }}>{total}</text>
      <text x="50%" y="60%" textAnchor="middle" dominantBaseline="middle" style={{ fill: "#94a3b8", fontSize: 11 }}>tasks</text>

  );

    }, (e) => console.error(e));
    return unsub;
  }, [authUser]);

  const reset = async () => {
    if (!isAdmin) return;

  const me = (data && authUser) ? data.staff.find((s) => s.email && s.email.toLowerCase() === authUser.email.toLowerCase()) : null;
  const isAdmin = me?.role === "Admin";
  const userId = me?.id;
  const staffName = (id) => data?.staff.find((s) => s.id === id)?.name || "Unassigned";
  const clientName = (id) => data?.clients.find((c) => c.id === id)?.name || "—";
  const master = (id) => data?.masters.find((m) => m.id === id);
  const titleOf = (t) => master(t.masterId)?.title || "—";
  const areaOf = (t) => master(t.masterId)?.compliance || "";

  const visibleTasks = useMemo(() => {
    if (!data) return [];
    return isAdmin ? data.tasks : data.tasks.filter((t) => t.staffId === userId);
  }, [data, isAdmin, userId]);

  const alerts = useMemo(() => {
    if (!data) return [];
    const s = data.settings;
    const lead = s.reminderDays.length ? Math.max(...s.reminderDays) : 0;
    return visibleTasks.filter((t) => {
      if (t.status === "Completed") return false;
      const d = daysUntil(t.due);
      if (d < 0) return s.remindOverdue;
      if (d === 0) return s.remindOnDueDate;
      return d <= lead;
    }).sort((a, b) => daysUntil(a.due) - daysUntil(b.due));
  }, [data, visibleTasks]);

  if (authUser === undefined) return <Splash>Loading…</Splash>;
  if (authUser === null) return <Login />;
  if (!data) return <Splash>Setting up your workspace…</Splash>;
  if (!me) return <NotLinked email={authUser.email} />;

  /* mutations */
  const addTasks = (rows) => save({ ...data, tasks: [...data.tasks, ...rows.map((r) => ({ ...r, id: uid() }))] });

  const delTask = (id) => save({ ...data, tasks: data.tasks.filter((t) => t.id !== id) });
  const cycleStatus = (t) => {
    const i = STATUS.indexOf(t.status);
    updateTask({ ...t, status: STATUS[(i + 1) % STATUS.length] });
  };
  const applyBulk = (newMasters, finalTasks) => save({ ...data, masters: [...data.masters, ...newMasters], tasks: finalTasks });

  const upsertClient = (c) => {
    const clients = data.clients.some((x) => x.id === c.id)
      ? data.clients.map((x) => (x.id === c.id ? c : x)) : [...data.clients, { ...c, id: uid() }];
    save({ ...data, clients });
  };
  const delClient = (id) => save({ ...data, clients: data.clients.filter((c) => c.id !== id) });

  const addNotice = (n) => save({ ...data, notices: [{ id: uid(), ts: Date.now(), ...n }, ...(data.notices || [])] });
  const delNotice = (id) => save({ ...data, notices: (data.notices || []).filter((x) => x.id !== id) });

  const ctx = { data, isAdmin, me, userId, staffName, clientName, master, titleOf, areaOf, visibleTasks, setModal, setTab, setTaskPreset, addNotice, delNotice };

  const NAV = [
    { id: "dashboard", label: "Dashboard", icon: LayoutDashboard },
    { id: "calendar", label: "Calendar", icon: CalendarDays },
    { id: "tasks", label: "Tasks", icon: ListChecks },
    { id: "clients", label: "Clients", icon: Building2 },
    ...(isAdmin ? [{ id: "team", label: "Team", icon: Users }, { id: "settings", label: "Settings", icon: SettingsIcon }] : []),
  ];

  return (
    <div className="min-h-screen bg-gradient-to-b from-indigo-50 to-slate-50 font-sans text-slate-700 lg:flex">

            <div className="text-sm font-semibold text-slate-800">Practice Desk</div>
            <div className="text-xs text-slate-400">{data.settings.firmName}</div>
          </div>
        </div>
        <nav className="flex flex-1 flex-col gap-1">
          {NAV.map((n) => {
            const Icon = n.icon; const active = tab === n.id;
            return (
              <button key={n.id} onClick={() => setTab(n.id)}
                className={`flex items-center gap-2.5 rounded-xl px-3 py-2 text-sm font-medium transition ${active ? "bg-indigo-500 text-white shadow-sm" : "text-slate-500 hover:bg-slate-100"}`}>
                <Icon size={17} /> {n.label}
              </button>
            );
          })}
        </nav>
        <div className="px-3 pt-2 text-xs text-slate-300">Prototype</div>
      </aside>

      {/* Main column */}
      <div className="min-w-0 flex-1">
      <header className="sticky top-0 z-20 border-b border-slate-200 bg-white/80 backdrop-blur">
        <div className="flex items-center gap-3 px-4 py-3 lg:px-8">
          <div className="mr-auto flex items-center gap-2 lg:hidden">
            <div className="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-500 to-violet-500 text-white shadow-sm"><LayoutDashboard size={18} /></div>
            <div className="leading-tight">
              <div className="text-sm font-semibold text-slate-800">Practice Desk</div>
              <div className="text-xs text-slate-400">{data.settings.firmName}</div>
            </div>
          </div>
          <div className="mr-auto hidden text-sm font-semibold text-slate-800 lg:block">{NAV.find((n) => n.id === tab)?.label || "Dashboard"}</div>
          <div className="relative">
            <button onClick={() => setShowNotif((v) => !v)} className="relative rounded-xl border border-slate-200 bg-white p-2 text-slate-500 hover:bg-slate-50" aria-label="Notifications">
              <Bell size={18} />
              {alerts.length > 0 && <span className="absolute -right-1 -top-1 flex h-4 min-w-4 items-center justify-center rounded-full bg-rose-400 px-1 text-[10px] font-semibold text-white">{alerts.length}</span>}
            </button>
            {showNotif && (
              <div className="absolute right-0 mt-2 w-72 rounded-2xl border border-slate-200 bg-white p-2 shadow-lg">
                <div className="px-2 py-1 text-xs font-semibold text-slate-500">Reminders</div>
                {alerts.length === 0 && <div className="px-2 py-3 text-sm text-slate-400">Nothing due in the reminder window.</div>}
                {alerts.slice(0, 8).map((t) => {

            )}

          <div className="hidden text-right leading-tight sm:block">

        {tab === "clients" && <Clients {...ctx} delClient={delClient} />}

      {modal?.type === "master" && <MasterModal data={data} master={modal.payload} save={save} onClose={() => setModal(null)} />}
      {modal?.type === "client" && <ClientModal data={data} client={modal.payload} onSave={(c) => { upsertClient(c); setModal(null); }} onClose={() => setModal(null)} />}
      {modal?.type === "notice" && <NoticeModal me={me} onAdd={addNotice} onClose={() => setModal(null)} />}

  );
}

  const open = visibleTasks.filter((t) => t.status !== "Completed");
  const overdue = open.filter((t) => daysUntil(t.due) < 0);
  const dueSoon = open.filter((t) => daysUntil(t.due) >= 0 && daysUntil(t.due) <= 7);
  const activeClients = isAdmin ? data.clients.filter((c) => c.status === "Active").length : data.clients.filter((c) => c.staffId === me.id).length;
  const stats = [
    { label: isAdmin ? "Active clients" : "My clients", val: activeClients, cls: "bg-indigo-50 text-indigo-700", grad: "from-white to-indigo-50", icon: Building2, act: "clients" },
    { label: "Open tasks", val: open.length, cls: "bg-sky-50 text-sky-700", grad: "from-white to-sky-50", icon: ListChecks, act: "open" },
    { label: "Overdue", val: overdue.length, cls: "bg-rose-50 text-rose-700", grad: "from-white to-rose-50", icon: AlertTriangle, act: "overdue" },
    { label: "Due in 7 days", val: dueSoon.length, cls: "bg-amber-50 text-amber-700", grad: "from-white to-amber-50", icon: Clock, act: "duesoon" },
  ];
  const byArea = data.settings.complianceAreas.map((c) => ({ c, n: open.filter((t) => areaOf(t) === c).length })).filter((x) => x.n > 0);
  const byStaff = data.staff.filter((s) => s.role === "Staff").map((s) => ({ s, n: data.tasks.filter((t) => t.staffId === s.id && t.status !== "Completed").length }));
  const maxStaff = Math.max(1, ...byStaff.map((x) => x.n));
  const upcoming = [...open].sort((a, b) => daysUntil(a.due) - daysUntil(b.due)).slice(0, 6);
  const donutSegs = [
    { label: "Pending", value: visibleTasks.filter((t) => t.status === "Pending").length, color: "#94a3b8" },
    { label: "In Progress", value: visibleTasks.filter((t) => t.status === "In Progress").length, color: "#818cf8" },
    { label: "Completed", value: visibleTasks.filter((t) => t.status === "Completed").length, color: "#34d399" },

  const go = (act) => { if (act === "clients") { setTab("clients"); return; } setTaskPreset({ kind: act, n: Date.now() }); setTab("tasks"); };

  return (
    <div className="space-y-5">
      <div className="relative overflow-hidden rounded-2xl border border-indigo-100 bg-gradient-to-br from-indigo-50 via-violet-50 to-white p-5">
        <div className="relative z-10">
          <h1 className="text-lg font-semibold text-slate-800">{isAdmin ? "Firm overview" : `Hello, ${me.name}`}</h1>
          <p className="text-sm text-slate-500">{isAdmin ? "Everything across the firm at a glance." : "Your assigned compliances and deadlines."}</p>
        </div>
        <div className="pointer-events-none absolute -right-5 -top-5 text-indigo-100">{isAdmin ? <LayoutDashboard size={120} /> : <CalendarDays size={120} />}</div>
      </div>

      <Card className="p-4">
        <div className="mb-3 flex items-center justify-between">
          <h2 className="flex items-center gap-1.5 text-sm font-semibold text-slate-700"><BellRing size={15} className="text-indigo-400" /> Notice board</h2>
          {isAdmin && <button onClick={() => setModal({ type: "notice" })} className="inline-flex items-center gap-1 text-xs font-medium text-indigo-500 hover:underline"><Plus size={13} /> Post notice</button>}
        </div>
        {(!data.notices || data.notices.length === 0) ? (
          <p className="text-sm text-slate-400">No notices yet.</p>
        ) : (
          <div className="space-y-2">
            {data.notices.slice(0, 5).map((n) => (
              <div key={n.id} className="rounded-xl border border-slate-100 bg-slate-50 p-3">
                <div className="flex items-start justify-between gap-2">
                  <div className="text-sm font-semibold text-slate-700">{n.title}</div>
                  {isAdmin && <button onClick={() => delNotice(n.id)} className="shrink-0 text-slate-300 hover:text-rose-500"><X size={14} /></button>}
                </div>
                {n.body && <div className="mt-0.5 whitespace-pre-wrap text-sm text-slate-600">{n.body}</div>}
                <div className="mt-1 text-xs text-slate-400">{n.author || "Admin"} · {new Date(n.ts).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" })}</div>
              </div>
            ))}
          </div>
        )}
      </Card>

      <div className="grid grid-cols-2 gap-3 lg:grid-cols-4">
        {stats.map((s) => { const Icon = s.icon; return (
          <button key={s.label} onClick={() => go(s.act)} className={`rounded-2xl border border-slate-200 bg-gradient-to-br ${s.grad} p-4 text-left shadow-sm transition hover:-translate-y-0.5 hover:shadow-md`}>
            <div className={`mb-3 inline-flex h-9 w-9 items-center justify-center rounded-xl ${s.cls}`}><Icon size={18} /></div>
            <div className="text-2xl font-semibold text-slate-800">{s.val}</div>
            <div className="flex items-center gap-1 text-xs text-slate-400">{s.label} <ChevronRight size={12} /></div>
          </button>); })}
      </div>
      <div className="grid gap-4 lg:grid-cols-2">
        <Card className="p-4">
          <h2 className="mb-3 text-sm font-semibold text-slate-700">Task status</h2>
          <div className="flex items-center gap-5">
            <Donut segments={donutSegs} />
            <div className="flex-1 space-y-2">
              {donutSegs.map((s) => (
                <div key={s.label} className="flex items-center gap-2 text-sm">
                  <span className="h-2.5 w-2.5 rounded-full" style={{ background: s.color }} />
                  <span className="text-slate-600">{s.label}</span>
                  <span className="ml-auto font-medium text-slate-700">{s.value}</span>
                </div>
              ))}

          </div>
        </Card>
        {isAdmin && (
          <Card className="p-4">
            <h2 className="mb-3 text-sm font-semibold text-slate-700">Open tasks per staff</h2>
            <div className="space-y-2.5">
              {byStaff.map(({ s, n }) => (
                <div key={s.id} className="flex items-center gap-3">
                  <div className="w-20 truncate text-sm text-slate-600">{s.name}</div>
                  <div className="h-2.5 flex-1 overflow-hidden rounded-full bg-slate-100"><div className="h-full rounded-full bg-indigo-300" style={{ width: `${(n / maxStaff) * 100}%` }} /></div>
                  <div className="w-6 text-right text-sm font-medium text-slate-700">{n}</div>

              ))}
            </div>
          </Card>
        )}
        <Card className="p-4">
          <h2 className="mb-3 text-sm font-semibold text-slate-700">Open tasks by area</h2>
          {byArea.length === 0 ? <p className="text-sm text-slate-400">No open tasks.</p> : (
            <div className="flex flex-wrap gap-2">{byArea.map(({ c, n }) => <Chip key={c} cls={colorFor(c)}>{c} · {n}</Chip>)}</div>
          )}
        </Card>
        <Card className={`p-4 ${isAdmin ? "lg:col-span-2" : ""}`}>
          <div className="mb-3 flex items-center justify-between">
            <h2 className="text-sm font-semibold text-slate-700">Upcoming deadlines</h2>
            <button onClick={() => setTab("tasks")} className="text-xs font-medium text-indigo-500 hover:underline">View all</button>
          </div>
          {upcoming.length === 0 ? <p className="text-sm text-slate-400">Nothing pending.</p> : (
            <div className="divide-y divide-slate-100">
              {upcoming.map((t) => { const d = daysUntil(t.due); return (
                <div key={t.id} className="flex items-center gap-3 py-2.5">
                  <span className={`h-2.5 w-2.5 shrink-0 rounded-full ${U[urgency(t)].dot}`} />
                  <div className="min-w-0 flex-1">
                    <div className="truncate text-sm font-medium text-slate-700">{titleOf(t)}</div>
                    <div className="truncate text-xs text-slate-400">{clientName(t.clientId)} · {staffName(t.staffId)}</div>
                  </div>
                  <Chip cls={colorFor(areaOf(t))}>{areaOf(t)}</Chip>
                  <div className="w-24 text-right text-xs text-slate-500">{fmt(t.due)}<br /><span className={d < 0 ? "text-rose-500" : "text-slate-400"}>{d < 0 ? `${-d}d overdue` : d === 0 ? "today" : `in ${d}d`}</span></div>
                </div>); })}
            </div>
          )}
        </Card>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  Calendar                                                           */
/* ------------------------------------------------------------------ */
function Calendar({ visibleTasks, clientName, staffName, titleOf, areaOf }) {
  const [view, setView] = useState(() => { const d = today(); return { y: d.getFullYear(), m: d.getMonth() }; });
  const [sel, setSel] = useState(toISO(today()));
  const startPad = new Date(view.y, view.m, 1).getDay();
  const dim = new Date(view.y, view.m + 1, 0).getDate();
  const cells = []; for (let i = 0; i < startPad; i++) cells.push(null); for (let d = 1; d <= dim; d++) cells.push(d);
  const on = (d) => visibleTasks.filter((t) => t.due === `${view.y}-${pad(view.m + 1)}-${pad(d)}`);
  const worst = (ts) => { const order = ["overdue", "due-soon", "upcoming", "completed"]; let b = null; ts.forEach((t) => { const u = urgency(t); if (b === null || order.indexOf(u) < order.indexOf(b)) b = u; }); return b; };
  const selTasks = visibleTasks.filter((t) => t.due === sel).sort((a, b) => titleOf(a).localeCompare(titleOf(b)));
  const move = (n) => { const d = new Date(view.y, view.m + n, 1); setView({ y: d.getFullYear(), m: d.getMonth() }); };

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-lg font-semibold text-slate-800">Compliance calendar</h1>
        <div className="flex flex-wrap gap-2">{Object.keys(U).map((k) => <span key={k} className="inline-flex items-center gap-1 text-xs text-slate-500"><span className={`h-2.5 w-2.5 rounded-full ${U[k].dot}`} /> {U[k].label}</span>)}</div>
      </div>
      <Card className="p-4">
        <div className="mb-3 flex items-center justify-between">
          <button onClick={() => move(-1)} className="rounded-lg p-1.5 text-slate-500 hover:bg-slate-100"><ChevronLeft size={18} /></button>
          <div className="text-sm font-semibold text-slate-700">{MONTHS[view.m]} {view.y}</div>
          <button onClick={() => move(1)} className="rounded-lg p-1.5 text-slate-500 hover:bg-slate-100"><ChevronRight size={18} /></button>
        </div>
        <div className="grid grid-cols-7 gap-1 text-center text-[11px] font-medium text-slate-400">{["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map((d) => <div key={d} className="py-1">{d}</div>)}</div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((d, i) => {
            if (d === null) return <div key={i} />;
            const iso = `${view.y}-${pad(view.m + 1)}-${pad(d)}`; const ts = on(d); const u = ts.length ? worst(ts) : null;
            const isToday = iso === toISO(today()); const isSel = iso === sel;
            return (
              <button key={i} onClick={() => setSel(iso)}
                className={`flex aspect-square flex-col items-center justify-start rounded-xl border p-1 text-xs transition ${isSel ? "border-indigo-300 ring-2 ring-indigo-100" : "border-transparent hover:border-slate-200"} ${u ? U[u].chip : "text-slate-500"}`}>
                <span className={`flex h-5 w-5 items-center justify-center rounded-full ${isToday ? "bg-indigo-500 text-white" : ""}`}>{d}</span>
                {ts.length > 0 && <span className="mt-0.5 flex gap-0.5">{ts.slice(0, 3).map((t) => <span key={t.id} className={`h-1.5 w-1.5 rounded-full ${U[urgency(t)].dot}`} />)}</span>}
              </button>
            );
          })}
        </div>
      </Card>
      <Card className="p-4">
        <h2 className="mb-2 text-sm font-semibold text-slate-700">{fmt(sel)}</h2>
        {selTasks.length === 0 ? <Empty icon={CalendarDays} text="No compliances on this day." /> : (
          <div className="divide-y divide-slate-100">
            {selTasks.map((t) => (
              <div key={t.id} className="flex items-center gap-3 py-2.5">
                <span className={`h-2.5 w-2.5 rounded-full ${U[urgency(t)].dot}`} />
                <div className="min-w-0 flex-1"><div className="truncate text-sm font-medium text-slate-700">{titleOf(t)}</div><div className="truncate text-xs text-slate-400">{clientName(t.clientId)} · {staffName(t.staffId)}</div></div>
                <Chip cls={colorFor(areaOf(t))}>{areaOf(t)}</Chip>
                <Chip cls={STATUS_STYLE[t.status]}>{t.status}</Chip>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  Tasks  (Assignments  +  Task Master)                               */
/* ------------------------------------------------------------------ */
function Tasks({ isAdmin, data, visibleTasks, clientName, staffName, titleOf, areaOf, cycleStatus, delTask, setModal, preset }) {
  const [sub, setSub] = useState("assignments");
  const [fStatus, setFStatus] = useState("All");
  const [fArea, setFArea] = useState("All");
  const [fStaff, setFStaff] = useState("All");
  const [fMaster, setFMaster] = useState("All");
  const [pk, setPk] = useState(null); // dashboard preset: open | overdue | duesoon
  useEffect(() => { if (preset) { setPk(preset.kind); setSub("assignments"); } }, [preset]);

  let list = [...visibleTasks];
  if (fStatus !== "All") list = list.filter((t) => t.status === fStatus);
  if (fArea !== "All") list = list.filter((t) => areaOf(t) === fArea);
  if (fMaster !== "All") list = list.filter((t) => t.masterId === fMaster);
  if (isAdmin && fStaff !== "All") list = list.filter((t) => t.staffId === fStaff);
  if (pk === "open") list = list.filter((t) => t.status !== "Completed");
  else if (pk === "overdue") list = list.filter((t) => t.status !== "Completed" && daysUntil(t.due) < 0);
  else if (pk === "duesoon") list = list.filter((t) => t.status !== "Completed" && daysUntil(t.due) >= 0 && daysUntil(t.due) <= 7);
  list.sort((a, b) => parse(a.due) - parse(b.due));

  const Sel = ({ value, onChange, children }) => (
    <select value={value} onChange={(e) => onChange(e.target.value)} className="rounded-xl border border-slate-200 bg-white px-3 py-1.5 text-sm text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-200">{children}</select>
  );

  return (
    <div className="space-y-4">
      <div className="flex flex-wrap items-center justify-between gap-3">
        <h1 className="text-lg font-semibold text-slate-800">Tasks</h1>
        {isAdmin && (
          <div className="flex gap-2">
            <button onClick={() => setModal({ type: "bulk" })} className="inline-flex items-center gap-1.5 rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50"><Upload size={16} /> Bulk import</button>
            <button onClick={() => setModal({ type: "assign" })} className="inline-flex items-center gap-1.5 rounded-xl bg-indigo-500 px-3 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-600"><Plus size={16} /> Assign task</button>
          </div>
        )}
      </div>

      {isAdmin && (
        <div className="inline-flex rounded-xl border border-slate-200 bg-white p-1 text-sm">
          {[["assignments", "Assignments", ListChecks], ["master", "Task Master", Layers]].map(([id, label, Icon]) => (
            <button key={id} onClick={() => setSub(id)} className={`inline-flex items-center gap-1.5 rounded-lg px-3 py-1.5 font-medium ${sub === id ? "bg-indigo-500 text-white" : "text-slate-500"}`}><Icon size={14} /> {label}</button>
          ))}
        </div>
      )}

      {sub === "assignments" ? (
        <>
          <div className="flex flex-wrap gap-2">
            <Sel value={fStatus} onChange={setFStatus}><option>All</option>{STATUS.map((s) => <option key={s}>{s}</option>)}</Sel>
            <Sel value={fArea} onChange={setFArea}><option value="All">All areas</option>{data.settings.complianceAreas.map((c) => <option key={c}>{c}</option>)}</Sel>

            {isAdmin && <Sel value={fStaff} onChange={setFStaff}><option value="All">All staff</option>{data.staff.filter((s) => s.role === "Staff").map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}</Sel>}
            {pk && <button onClick={() => setPk(null)} className="inline-flex items-center gap-1 rounded-xl border border-indigo-200 bg-indigo-50 px-3 py-1.5 text-sm font-medium text-indigo-700">{pk === "open" ? "Open" : pk === "overdue" ? "Overdue" : "Due in 7 days"} <X size={13} /></button>}
          </div>
          <Card className="overflow-hidden">
            {list.length === 0 ? <Empty icon={ListChecks} text="No tasks match these filters." /> : (
              <div className="divide-y divide-slate-100">
                {list.map((t) => { const d = daysUntil(t.due); return (
                  <div key={t.id} className="flex flex-wrap items-center gap-3 p-3.5">

                    <Chip cls={colorFor(areaOf(t))}>{areaOf(t)}</Chip>
                    <div className="w-24 text-right text-xs text-slate-500">{fmt(t.due)}<br /><span className={t.status !== "Completed" && d < 0 ? "text-rose-500" : "text-slate-400"}>{t.status === "Completed" ? "done" : d < 0 ? `${-d}d overdue` : d === 0 ? "today" : `in ${d}d`}</span></div>
                    <button onClick={() => cycleStatus(t)} title="Tap to change status"><Chip cls={STATUS_STYLE[t.status]}>{t.status === "Completed" ? <CheckCircle2 size={12} /> : null}{t.status}</Chip></button>
                    {isAdmin && (
                      <div className="flex gap-1">
                        <button onClick={() => setModal({ type: "assign", payload: t })} className="rounded-lg p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600"><Pencil size={15} /></button>

                      </div>
                    )}
                  </div>); })}
              </div>
            )}
          </Card>
        </>
      ) : (
        <MasterList data={data} setModal={setModal} />

}

function Team({ data, save }) {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const add = () => { if (!name.trim()) return; save({ ...data, staff: [...data.staff, { id: uid(), name: name.trim(), email: email.trim(), role: "Staff" }] }); setName(""); setEmail(""); };
  const remove = (id) => save({ ...data, staff: data.staff.filter((s) => s.id !== id), tasks: data.tasks.map((t) => (t.staffId === id ? { ...t, staffId: "" } : t)), clients: data.clients.map((c) => (c.staffId === id ? { ...c, staffId: "" } : c)) });
  const setStaffEmail = (id, v) => save({ ...data, staff: data.staff.map((s) => (s.id === id ? { ...s, email: v } : s)) });
  return (
    <div className="space-y-4">
      <h1 className="text-lg font-semibold text-slate-800">Team</h1>
      <p className="text-sm text-slate-400">Each person's email must match the login you created in Firebase, so the app knows who they are.</p>
      <Card className="p-4">
        <div className="flex flex-col gap-2 sm:flex-row">
          <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Name" className={inputCls} />
          <input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Login email" className={inputCls} />
          <button onClick={add} className="rounded-xl bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-600 sm:px-6">Add</button>
        </div>
      </Card>
      <Card className="overflow-hidden"><div className="divide-y divide-slate-100">{data.staff.map((s) => (
        <div key={s.id} className="flex flex-wrap items-center gap-3 p-3.5">
          <div className="flex h-9 w-9 items-center justify-center rounded-full bg-gradient-to-br from-indigo-100 to-violet-100 text-sm font-semibold text-indigo-600">{s.name.slice(0, 1).toUpperCase()}</div>
          <div className="min-w-0 flex-1">
            <div className="text-sm font-medium text-slate-700">{s.name} <span className="text-xs font-normal text-slate-400">· {s.role}</span></div>
            <input value={s.email || ""} onChange={(e) => setStaffEmail(s.id, e.target.value)} placeholder="link login email…" className="mt-1 w-full max-w-xs rounded-lg border border-slate-200 px-2 py-1 text-xs text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-200" />
          </div>
          {s.role !== "Admin" && <button onClick={() => remove(s.id)} className="rounded-lg p-1.5 text-slate-400 hover:bg-rose-50 hover:text-rose-500"><Trash2 size={15} /></button>}
        </div>
      ))}</div></Card>
    </div>
  );
}

function Splash({ children }) {

}

function Login() {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const submit = async () => {
    setErr(""); setBusy(true);
    try { await firebase.auth().signInWithEmailAndPassword(email.trim(), pw); }
    catch (e) { setErr((e.code === "auth/invalid-credential" || e.code === "auth/wrong-password" || e.code === "auth/user-not-found") ? "Wrong email or password." : (e.message || "Sign in failed.")); setBusy(false); }
  };
  return (
    <div className="flex min-h-screen items-center justify-center bg-gradient-to-br from-indigo-50 via-violet-50 to-slate-50 p-4 font-sans">
      <div className="w-full max-w-sm rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
        <div className="mb-5 flex items-center gap-2">
          <div className="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-500 to-violet-500 text-white shadow-sm"><LayoutDashboard size={20} /></div>
          <div><div className="text-base font-semibold text-slate-800">Practice Desk</div><div className="text-xs text-slate-400">Sign in to continue</div></div>
        </div>
        <div className="space-y-3">
          <input value={email} onChange={(e) => setEmail(e.target.value)} type="email" placeholder="Email" className={inputCls} />
          <input value={pw} onChange={(e) => setPw(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} type="password" placeholder="Password" className={inputCls} />
          {err && <p className="text-xs text-rose-600">{err}</p>}
          <button onClick={submit} disabled={busy || !email || !pw} className="w-full rounded-xl bg-indigo-500 px-4 py-2.5 text-sm font-medium text-white hover:bg-indigo-600 disabled:opacity-50">{busy ? "Signing in…" : "Sign in"}</button>
        </div>
        <p className="mt-4 text-center text-xs text-slate-400">Accounts are created by your admin in Firebase.</p>
      </div>
    </div>
  );
}

function NotLinked({ email }) {
  return (
    <div className="flex min-h-screen items-center justify-center bg-gradient-to-br from-indigo-50 to-slate-50 p-4 font-sans">

        <h2 className="text-base font-semibold text-slate-800">Almost there</h2>
        <p className="mt-1 text-sm text-slate-500">You're signed in as <span className="font-medium text-slate-700">{email}</span>, but this email isn't linked to a team member yet. Ask your admin to add it under <span className="font-medium">Team</span>.</p>
        <button onClick={() => firebase.auth().signOut()} className="mt-4 rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">Sign out</button>

    </div>

/* ------------------------------------------------------------------ */
/*  Settings                                                           */
/* ------------------------------------------------------------------ */
const LEAD_PRESETS = [1, 2, 3, 5, 7, 10, 14, 30];
function SettingsPanel({ data, save }) {
  const s = data.settings;
  const setS = (patch) => save({ ...data, settings: { ...s, ...patch } });
  const [firm, setFirm] = useState(s.firmName);
  const [newArea, setNewArea] = useState("");
  const toggleLead = (n) => { const has = s.reminderDays.includes(n); setS({ reminderDays: has ? s.reminderDays.filter((x) => x !== n) : [...s.reminderDays, n].sort((a, b) => a - b) }); };
  const addArea = () => { const a = newArea.trim(); if (!a || s.complianceAreas.includes(a)) return; setS({ complianceAreas: [...s.complianceAreas, a] }); setNewArea(""); };
  const removeArea = (a) => setS({ complianceAreas: s.complianceAreas.filter((x) => x !== a) });
  const Section = ({ icon: Icon, children, hint }) => (<div className="mb-3"><div className="flex items-center gap-2 text-sm font-semibold text-slate-700"><Icon size={15} className="text-indigo-400" /> {children}</div>{hint && <p className="mt-0.5 text-xs text-slate-400">{hint}</p>}</div>);
  return (
    <div className="space-y-4">
      <div><h1 className="text-lg font-semibold text-slate-800">Settings</h1><p className="text-sm text-slate-400">Admin controls for the whole firm. Staff don't see this tab.</p></div>
      <Card className="p-4"><Section icon={Building2}>Firm name</Section><div className="flex gap-2"><input value={firm} onChange={(e) => setFirm(e.target.value)} className={inputCls} /><button onClick={() => setS({ firmName: firm.trim() || s.firmName })} className="rounded-xl bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-600">Save</button></div></Card>
      <Card className="p-4">
        <Section icon={BellRing} hint="Drives the bell. A task surfaces as a reminder on these lead days, on its due date, and while overdue.">Reminder timings</Section>
        <div className="mb-1 text-xs font-medium text-slate-500">Remind before due date</div>
        <div className="mb-4 flex flex-wrap gap-2">{LEAD_PRESETS.map((n) => { const on = s.reminderDays.includes(n); return <button key={n} onClick={() => toggleLead(n)} className={`rounded-full border px-3 py-1 text-sm font-medium transition ${on ? "border-indigo-300 bg-indigo-50 text-indigo-700" : "border-slate-200 bg-white text-slate-500 hover:bg-slate-50"}`}>{n} day{n > 1 ? "s" : ""}</button>; })}</div>
        <div className="space-y-2">
          <Toggle label="Remind on the due date" on={s.remindOnDueDate} onClick={() => setS({ remindOnDueDate: !s.remindOnDueDate })} />
          <Toggle label="Keep reminding while overdue" on={s.remindOverdue} onClick={() => setS({ remindOverdue: !s.remindOverdue })} />
        </div>
      </Card>
      <Card className="p-4">
        <Section icon={Tags} hint="Categories available on master tasks.">Compliance areas</Section>
        <div className="mb-3 flex flex-wrap gap-2">{s.complianceAreas.map((a) => <span key={a} className={`inline-flex items-center gap-1.5 rounded-full border px-2.5 py-1 text-xs font-medium ${colorFor(a)}`}>{a}<button onClick={() => removeArea(a)} className="rounded-full hover:bg-white/60"><X size={12} /></button></span>)}</div>
        <div className="flex gap-2"><input value={newArea} onChange={(e) => setNewArea(e.target.value)} className={inputCls} placeholder="Add area, e.g. PF / ESI, PT, Customs" /><button onClick={addArea} className="rounded-xl bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-600">Add</button></div>
      </Card>
    </div>
  );
}
function Toggle({ label, on, onClick }) {
  return (<button onClick={onClick} className="flex w-full items-center justify-between rounded-xl border border-slate-200 px-3 py-2 text-sm text-slate-600 hover:bg-slate-50"><span>{label}</span><span className={`relative h-5 w-9 rounded-full transition ${on ? "bg-indigo-400" : "bg-slate-200"}`}><span className={`absolute top-0.5 h-4 w-4 rounded-full bg-white shadow transition ${on ? "left-4" : "left-0.5"}`} /></span></button>);
}

function Modal({ title, onClose, children, wide }) {
  return (
    <div className="fixed inset-0 z-30 flex items-end justify-center bg-slate-900/30 p-0 sm:items-center sm:p-4" onClick={onClose}>
      <div className={`w-full ${wide ? "max-w-lg" : "max-w-md"} max-h-[90vh] overflow-y-auto rounded-t-3xl border border-slate-200 bg-white p-5 shadow-xl sm:rounded-3xl`} onClick={(e) => e.stopPropagation()}>
        <div className="mb-4 flex items-center justify-between"><h3 className="text-sm font-semibold text-slate-800">{title}</h3><button onClick={onClose} className="rounded-lg p-1 text-slate-400 hover:bg-slate-100"><X size={18} /></button></div>
        {children}
      </div>

/* ------------------------------------------------------------------ */
/*  Assign task  (one master → many companies → a person each)         */
/* ------------------------------------------------------------------ */
function AssignModal({ data, task, onAdd, onUpdate, onClose }) {
  const editing = !!task;
  const staffOptions = data.staff.filter((s) => s.role === "Staff");

  /* edit mode = single existing assignment */
  if (editing) {
    return <EditAssignment data={data} task={task} onUpdate={onUpdate} onClose={onClose} />;
  }

  const [masterId, setMasterId] = useState(data.masters[0]?.id || "");
  const [due, setDue] = useState(toISO(today()));
  const [rows, setRows] = useState(() => {
    const o = {}; data.clients.forEach((c) => { o[c.id] = { checked: false, staffId: c.staffId || staffOptions[0]?.id || "" }; }); return o;
  });
  const setRow = (id, patch) => setRows((p) => ({ ...p, [id]: { ...p[id], ...patch } }));
  const allChecked = data.clients.length > 0 && data.clients.every((c) => rows[c.id].checked);
  const toggleAll = () => { const v = !allChecked; setRows((p) => { const n = { ...p }; data.clients.forEach((c) => { n[c.id] = { ...n[c.id], checked: v }; }); return n; }); };
  const chosen = data.clients.filter((c) => rows[c.id].checked);
  const valid = masterId && due && chosen.length > 0;

  const create = () => {
    if (!valid) return;
    onAdd(chosen.map((c) => ({ masterId, clientId: c.id, staffId: rows[c.id].staffId, due, status: "Pending" })));
    onClose();
  };

  return (
    <Modal title="Assign task across companies" onClose={onClose} wide>
      <div className="space-y-3">
        <div className="grid grid-cols-2 gap-3">
          <Field label="Master task">
            <select className={inputCls} value={masterId} onChange={(e) => setMasterId(e.target.value)}>
              {data.masters.map((m) => <option key={m.id} value={m.id}>{m.title}</option>)}
            </select>
          </Field>
          <Field label="Due date"><input type="date" className={inputCls} value={due} onChange={(e) => setDue(e.target.value)} /></Field>
        </div>
        <div className="flex items-center justify-between">
          <span className="text-xs font-medium text-slate-500">Companies &amp; who handles each</span>
          <button onClick={toggleAll} className="inline-flex items-center gap-1 text-xs font-medium text-indigo-500">{allChecked ? <CheckSquare size={14} /> : <Square size={14} />} Select all</button>
        </div>
        <div className="max-h-64 space-y-1.5 overflow-y-auto rounded-xl border border-slate-200 p-2">
          {data.clients.map((c) => {
            const r = rows[c.id];
            return (
              <div key={c.id} className={`flex items-center gap-2 rounded-lg p-2 ${r.checked ? "bg-indigo-50/60" : ""}`}>
                <button onClick={() => setRow(c.id, { checked: !r.checked })} className="text-indigo-500">{r.checked ? <CheckSquare size={18} /> : <Square size={18} className="text-slate-300" />}</button>
                <div className="min-w-0 flex-1 truncate text-sm text-slate-700">{c.name}</div>
                <select disabled={!r.checked} value={r.staffId} onChange={(e) => setRow(c.id, { staffId: e.target.value })}
                  className="rounded-lg border border-slate-200 bg-white px-2 py-1 text-xs text-slate-600 disabled:opacity-40 focus:outline-none focus:ring-2 focus:ring-indigo-200">
                  {staffOptions.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
            );
          })}
        </div>
        <div className="flex gap-2 pt-1">
          <button onClick={onClose} className="flex-1 rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button onClick={create} disabled={!valid} className="flex-1 rounded-xl bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-600 disabled:opacity-40">Create {chosen.length || ""} assignment{chosen.length === 1 ? "" : "s"}</button>
        </div>
      </div>
    </Modal>
  );
}

function EditAssignment({ data, task, onUpdate, onClose }) {
  const staffOptions = data.staff.filter((s) => s.role === "Staff");
  const m = data.masters.find((x) => x.id === task.masterId);
  const [f, setF] = useState({ ...task });
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  return (
    <Modal title="Edit assignment" onClose={onClose}>
      <div className="space-y-3">
        <div className="rounded-xl bg-slate-50 px-3 py-2 text-sm"><span className="font-medium text-slate-700">{m?.title}</span> <Chip cls={colorFor(m?.compliance)}>{m?.compliance}</Chip><p className="mt-1 text-xs text-slate-400">Rename in Task Master to change everywhere.</p></div>
        <Field label="Company"><select className={inputCls} value={f.clientId} onChange={(e) => set("clientId", e.target.value)}>{data.clients.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}</select></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Assigned to"><select className={inputCls} value={f.staffId} onChange={(e) => set("staffId", e.target.value)}>{staffOptions.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}</select></Field>
          <Field label="Due date"><input type="date" className={inputCls} value={f.due} onChange={(e) => set("due", e.target.value)} /></Field>
        </div>
        <Field label="Status"><select className={inputCls} value={f.status} onChange={(e) => set("status", e.target.value)}>{STATUS.map((s) => <option key={s}>{s}</option>)}</select></Field>
        <div className="flex gap-2 pt-1">
          <button onClick={onClose} className="flex-1 rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button onClick={() => { onUpdate(f); onClose(); }} className="flex-1 rounded-xl bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-600">Save changes</button>
        </div>
      </div>
    </Modal>
  );
}

/* ------------------------------------------------------------------ */
/*  Master task modal                                                  */
/* ------------------------------------------------------------------ */
function MasterModal({ data, master, save, onClose }) {
  const [title, setTitle] = useState(master?.title || "");
  const [area, setArea] = useState(master?.compliance || data.settings.complianceAreas[0] || "");
  const inUse = master ? data.tasks.filter((t) => t.masterId === master.id).length : 0;
  const submit = () => {
    if (!title.trim()) return;
    if (master) save({ ...data, masters: data.masters.map((m) => (m.id === master.id ? { ...m, title: title.trim(), compliance: area } : m)) });
    else save({ ...data, masters: [...data.masters, { id: uid(), title: title.trim(), compliance: area }] });
    onClose();
  };
  const remove = () => {
    save({ ...data, masters: data.masters.filter((m) => m.id !== master.id), tasks: data.tasks.filter((t) => t.masterId !== master.id) });
    onClose();
  };
  return (
    <Modal title={master ? "Edit master task" : "New master task"} onClose={onClose}>
      <div className="space-y-3">
        <Field label="Task name"><input className={inputCls} value={title} onChange={(e) => setTitle(e.target.value)} placeholder="e.g. GSTR-3B filing" /></Field>
        <Field label="Area"><select className={inputCls} value={area} onChange={(e) => setArea(e.target.value)}>{data.settings.complianceAreas.map((c) => <option key={c}>{c}</option>)}</select></Field>
        <div className="flex gap-2 pt-1">
          {master && <button onClick={remove} className="rounded-xl border border-rose-200 px-3 py-2 text-sm font-medium text-rose-600 hover:bg-rose-50" title={`Removes this master and its ${inUse} assignment(s)`}><Trash2 size={15} /></button>}
          <button onClick={onClose} className="flex-1 rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button onClick={submit} disabled={!title.trim()} className="flex-1 rounded-xl bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-600 disabled:opacity-40">{master ? "Save" : "Create"}</button>
        </div>
        {master && inUse > 0 && <p className="text-xs text-slate-400">Deleting also removes its {inUse} assignment(s).</p>}
      </div>
    </Modal>
  );
}

/* ------------------------------------------------------------------ */
/*  Client modal                                                       */
/* ------------------------------------------------------------------ */
function ClientModal({ client, data, onSave, onClose }) {
  const staffOptions = data.staff.filter((s) => s.role === "Staff");
  const [f, setF] = useState({ id: client?.id, name: client?.name || "", type: client?.type || "Pvt Ltd", staffId: client?.staffId || staffOptions[0]?.id || "", status: client?.status || "Active" });
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const TYPES = ["Proprietorship", "Partnership", "LLP", "Pvt Ltd", "Public Ltd", "Foreign Subsidiary", "Trust", "HUF", "Individual"];
  return (
    <Modal title={client ? "Edit client" : "New client"} onClose={onClose}>
      <div className="space-y-3">
        <Field label="Client name"><input className={inputCls} value={f.name} onChange={(e) => set("name", e.target.value)} placeholder="e.g. ABC India Pvt Ltd" /></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Entity type"><select className={inputCls} value={f.type} onChange={(e) => set("type", e.target.value)}>{TYPES.map((t) => <option key={t}>{t}</option>)}</select></Field>
          <Field label="Status"><select className={inputCls} value={f.status} onChange={(e) => set("status", e.target.value)}><option>Active</option><option>Inactive</option></select></Field>
        </div>
        <Field label="Responsible staff"><select className={inputCls} value={f.staffId} onChange={(e) => set("staffId", e.target.value)}>{staffOptions.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}</select></Field>
        <div className="flex gap-2 pt-1">
          <button onClick={onClose} className="flex-1 rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button onClick={() => f.name.trim() && onSave(f)} disabled={!f.name.trim()} className="flex-1 rounded-xl bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-600 disabled:opacity-40">{client ? "Save changes" : "Add client"}</button>
        </div>
      </div>
    </Modal>
  );
}

/* ------------------------------------------------------------------ */
/*  Bulk import / update  (paste or CSV → upsert)                      */
/* ------------------------------------------------------------------ */
function BulkImport({ data, onApply, onClose }) {
  const [text, setText] = useState("");
  const [rows, setRows] = useState(null); // parsed preview
  const sample = "Task, Area, Client, Assignee, Due, Status\nGSTR-3B filing, GST, ABC India Pvt Ltd, Priya, 20-06-2026, Pending\nGSTR-3B filing, GST, DEF Trading LLP, Sneha, 20-06-2026, Pending";

  const lc = (s) => (s || "").trim().toLowerCase();
  const findStaff = (name) => data.staff.find((s) => s.role === "Staff" && lc(s.name) === lc(name));
  const findClient = (name) => data.clients.find((c) => lc(c.name) === lc(name));
  const findStatus = (s) => STATUS.find((x) => lc(x) === lc(s));

  const parseText = () => {
    const lines = text.split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
    const pendingMasters = {}; // lc title -> master obj (new)
    const out = [];
    lines.forEach((line, i) => {
      const cols = (line.includes("\t") ? line.split("\t") : line.split(",")).map((c) => c.trim());
      if (i === 0 && lc(cols[0]) === "task" && cols.some((c) => lc(c) === "client")) return; // header
      const [task, area, clientName, assignee, dueRaw, statusRaw] = cols;
      const row = { raw: line };
      if (!task || !clientName) { out.push({ ...row, error: "Task and Client are required" }); return; }
      const client = findClient(clientName);
      if (!client) { out.push({ ...row, error: `Unknown client "${clientName}"` }); return; }
      let staff = assignee ? findStaff(assignee) : data.staff.find((s) => s.id === client.staffId);
      if (assignee && !staff) { out.push({ ...row, error: `Unknown staff "${assignee}"` }); return; }
      if (!staff) { out.push({ ...row, error: "No assignee and client has no responsible staff" }); return; }
      const due = importDate(dueRaw);
      if (!due) { out.push({ ...row, error: `Bad date "${dueRaw}" (use YYYY-MM-DD or DD-MM-YYYY)` }); return; }
      const status = findStatus(statusRaw) || "Pending";
      let m = data.masters.find((x) => lc(x.title) === lc(task));
      let newMaster = false;
      if (!m) {
        const key = lc(task);
        if (pendingMasters[key]) m = pendingMasters[key];
        else { const validArea = data.settings.complianceAreas.find((a) => lc(a) === lc(area)) || area || data.settings.complianceAreas[0]; m = { id: uid(), title: task, compliance: validArea }; pendingMasters[key] = m; newMaster = true; }
      }
      const existing = data.tasks.find((t) => t.masterId === m.id && t.clientId === client.id);
      out.push({ ...row, ok: true, mode: existing ? "update" : "create", newMaster, masterId: m.id, existingId: existing?.id, clientId: client.id, staffId: staff.id, due, status, label: `${task} · ${client.name} → ${staff.name}` });
    });
    setRows({ list: out, newMasters: Object.values(pendingMasters) });
  };

  const apply = () => {
    if (!rows) return;
    const ok = rows.list.filter((r) => r.ok);
    let tasks = [...data.tasks];
    ok.forEach((r) => {
      if (r.mode === "update") tasks = tasks.map((t) => (t.id === r.existingId ? { ...t, staffId: r.staffId, due: r.due, status: r.status } : t));
      else tasks.push({ id: uid(), masterId: r.masterId, clientId: r.clientId, staffId: r.staffId, due: r.due, status: r.status });
    });
    onApply(rows.newMasters, tasks);
    onClose();
  };

  const onFile = (e) => { const f = e.target.files?.[0]; if (!f) return; const reader = new FileReader(); reader.onload = () => setText(String(reader.result || "")); reader.readAsText(f); };

  const okCount = rows ? rows.list.filter((r) => r.ok).length : 0;
  const created = rows ? rows.list.filter((r) => r.ok && r.mode === "create").length : 0;
  const updated = rows ? rows.list.filter((r) => r.ok && r.mode === "update").length : 0;
  const errs = rows ? rows.list.filter((r) => !r.ok) : [];

  return (
    <Modal title="Bulk import / update" onClose={onClose} wide>
      {!rows ? (
        <div className="space-y-3">
          <p className="text-xs text-slate-500">Paste rows or upload a CSV. Columns: <span className="font-medium">Task, Area, Client, Assignee, Due, Status</span>. Matching by name. Existing Task+Client pairs are <span className="font-medium">updated</span>; new ones are <span className="font-medium">created</span>. Assignee blank = client's responsible staff.</p>
          <textarea value={text} onChange={(e) => setText(e.target.value)} rows={8} placeholder={sample} className={`${inputCls} font-mono text-xs`} />
          <div className="flex flex-wrap items-center gap-2">
            <label className="inline-flex cursor-pointer items-center gap-1.5 rounded-xl border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50"><Upload size={15} /> Upload CSV<input type="file" accept=".csv,text/csv,text/plain" onChange={onFile} className="hidden" /></label>
            <button onClick={() => setText(sample)} className="rounded-xl px-3 py-2 text-sm font-medium text-indigo-500 hover:bg-indigo-50">Insert sample</button>
            <div className="ml-auto flex gap-2">
              <button onClick={onClose} className="rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
              <button onClick={parseText} disabled={!text.trim()} className="rounded-xl bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-600 disabled:opacity-40">Preview</button>
            </div>
          </div>
        </div>
      ) : (
        <div className="space-y-3">
          <div className="flex flex-wrap gap-2 text-xs">
            <Chip cls="bg-emerald-50 text-emerald-700 border-emerald-200">{created} to create</Chip>
            <Chip cls="bg-indigo-50 text-indigo-700 border-indigo-200">{updated} to update</Chip>
            {rows.newMasters.length > 0 && <Chip cls="bg-violet-50 text-violet-700 border-violet-200">{rows.newMasters.length} new master(s)</Chip>}
            {errs.length > 0 && <Chip cls="bg-rose-50 text-rose-700 border-rose-200">{errs.length} error(s)</Chip>}
          </div>
          <div className="max-h-72 space-y-1 overflow-y-auto rounded-xl border border-slate-200 p-2">
            {rows.list.map((r, i) => (
              <div key={i} className={`flex items-start gap-2 rounded-lg px-2 py-1.5 text-xs ${r.ok ? "" : "bg-rose-50"}`}>
                {r.ok ? <CheckCircle2 size={14} className="mt-0.5 shrink-0 text-emerald-500" /> : <AlertTriangle size={14} className="mt-0.5 shrink-0 text-rose-500" />}
                <div className="min-w-0">
                  {r.ok ? <span className="text-slate-700">{r.label} · {fmt(r.due)} · <span className="text-slate-400">{r.mode}{r.newMaster ? " (new master)" : ""}</span></span>
                        : <span className="text-rose-600">{r.error} — <span className="text-rose-400">{r.raw}</span></span>}
                </div>
              </div>
            ))}
          </div>
          <div className="flex gap-2">
            <button onClick={() => setRows(null)} className="rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">Back</button>
            <button onClick={apply} disabled={okCount === 0} className="ml-auto rounded-xl bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-600 disabled:opacity-40">Apply {okCount} row{okCount === 1 ? "" : "s"}</button>
          </div>
        </div>
      )}
    </Modal>
  );
}


function NoticeModal({ me, onAdd, onClose }) {
  const [title, setTitle] = useState("");
  const [body, setBody] = useState("");
  const submit = () => { if (!title.trim() && !body.trim()) return; onAdd({ title: title.trim() || "Notice", body: body.trim(), author: me?.name || "Admin" }); onClose(); };
  return (
    <Modal title="Post a notice" onClose={onClose}>
      <div className="space-y-3">
        <Field label="Title"><input className={inputCls} value={title} onChange={(e) => setTitle(e.target.value)} placeholder="e.g. Office closed on Friday" /></Field>
        <Field label="Message"><textarea rows={5} className={inputCls} value={body} onChange={(e) => setBody(e.target.value)} placeholder="Write your notice… (line breaks are kept)" /></Field>
        <div className="flex gap-2 pt-1">
          <button onClick={onClose} className="flex-1 rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button onClick={submit} className="flex-1 rounded-xl bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-600">Post notice</button>
        </div>
      </div>
    </Modal>
  );
}
